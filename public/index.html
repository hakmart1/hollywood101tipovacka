<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hollywood 101 Tipovacka</title>
  </head>
  <body>
    <main>
      <h1>Hollywood 101 Tipovacka</h1>

      <p>
        Login status:
        <strong id="login-status">loading</strong>
      </p>

      <p id="user-info"></p>
      <p id="output"></p>

      <p>
        <button id="signup-button" type="button" hidden>Sign up</button>
        <button id="login-button" type="button" hidden>Login</button>
        <button id="logout-button" type="button" hidden>Logout</button>
      </p>

      <p id="activation-code-output"></p>

      <dialog id="signup-dialog">
        <form id="signup-form" method="dialog">
          <p><strong>Sign up</strong></p>
          <p>
            <label>
              Email<br />
              <input id="signup-email" name="email" type="email" required />
            </label>
          </p>
          <p>
            <label>
              Nickname<br />
              <input id="signup-nickname" name="nickname" required />
            </label>
          </p>
          <p>
            <label>
              Password<br />
              <input id="signup-password" name="password" type="password" required />
            </label>
          </p>
          <p>
            <label>
              Verify password<br />
              <input id="signup-password-verify" name="passwordVerify" type="password" required />
            </label>
          </p>
          <p>
            <button id="signup-submit" type="submit">Create active user</button>
            <button type="button" id="signup-cancel">Cancel</button>
          </p>
        </form>
      </dialog>

      <dialog id="login-dialog">
        <form id="login-form" method="dialog">
          <p><strong>Login</strong></p>
          <p>
            <label>
              Email<br />
              <input id="login-email" name="email" type="email" required />
            </label>
          </p>
          <p>
            <label>
              Password<br />
              <input id="login-password" name="password" type="password" required />
            </label>
          </p>
          <p>
            <button id="login-submit" type="submit">Login</button>
            <button type="button" id="login-cancel">Cancel</button>
          </p>
        </form>
      </dialog>
    </main>

    <script>
      const loginStatusElement = document.getElementById("login-status");
      const userInfoElement = document.getElementById("user-info");
      const outputElement = document.getElementById("output");
      const activationCodeOutputElement = document.getElementById("activation-code-output");
      const signupButton = document.getElementById("signup-button");
      const loginButton = document.getElementById("login-button");
      const logoutButton = document.getElementById("logout-button");
      const signupDialog = document.getElementById("signup-dialog");
      const loginDialog = document.getElementById("login-dialog");

      function setOutput(message) {
        outputElement.textContent = message || "";
      }

      function setActivationCodeOutput(message) {
        activationCodeOutputElement.textContent = message || "";
      }

      function setLoggedOutState() {
        loginStatusElement.textContent = "not-logged";
        userInfoElement.textContent = "";
        signupButton.hidden = false;
        loginButton.hidden = false;
        logoutButton.hidden = true;
      }

      function setLoggedInState(user) {
        if (user.status === "active") {
          loginStatusElement.textContent = "logged and active user";
        } else {
          loginStatusElement.textContent = "logged but unactive user";
        }

        userInfoElement.textContent =
          "User: " + user.nickname + " | Email: " + user.email + " | DB status: " + user.status;

        signupButton.hidden = true;
        loginButton.hidden = true;
        logoutButton.hidden = false;
      }

      async function refreshSession() {
        try {
          const response = await fetch("/api/me", {
            headers: {
              Accept: "application/json"
            }
          });

          if (response.status === 401) {
            setLoggedOutState();
            return;
          }

          const payload = await response.json();

          if (!response.ok) {
            setOutput(payload.error || "Could not load session.");
            setLoggedOutState();
            return;
          }

          setLoggedInState(payload.user);
        } catch (error) {
          setOutput("Could not reach the backend functions.");
          setLoggedOutState();
        }
      }

      signupButton.addEventListener("click", () => {
        setOutput("");
        signupDialog.showModal();
      });

      loginButton.addEventListener("click", () => {
        setOutput("");
        loginDialog.showModal();
      });

      document.getElementById("signup-cancel").addEventListener("click", () => {
        signupDialog.close();
      });

      document.getElementById("login-cancel").addEventListener("click", () => {
        loginDialog.close();
      });

      document.getElementById("signup-form").addEventListener("submit", async (event) => {
        event.preventDefault();

        const email = document.getElementById("signup-email").value.trim();
        const nickname = document.getElementById("signup-nickname").value.trim();
        const password = document.getElementById("signup-password").value;
        const passwordVerify = document.getElementById("signup-password-verify").value;

        if (password !== passwordVerify) {
          setOutput("Passwords do not match.");
          return;
        }

        const response = await fetch("/api/auth/signup", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Accept: "application/json"
          },
          body: JSON.stringify({
            email,
            nickname,
            password
          })
        });

        const payload = await response.json();

        if (!response.ok) {
          setOutput(payload.error || "Sign up failed.");
          setActivationCodeOutput("");
          return;
        }

        setOutput(payload.message || "User created.");
        if (payload.debugActivationCode) {
          setActivationCodeOutput("Debug activation code: " + payload.debugActivationCode);
        } else {
          setActivationCodeOutput("");
        }
        signupDialog.close();
        event.target.reset();
      });

      document.getElementById("login-form").addEventListener("submit", async (event) => {
        event.preventDefault();

        const email = document.getElementById("login-email").value.trim();
        const password = document.getElementById("login-password").value;

        const response = await fetch("/api/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Accept: "application/json"
          },
          body: JSON.stringify({
            email,
            password
          })
        });

        const payload = await response.json();

        if (!response.ok) {
          setOutput(payload.error || "Login failed.");
          return;
        }

        setOutput("Login successful.");
        loginDialog.close();
        event.target.reset();
        await refreshSession();
      });

      logoutButton.addEventListener("click", async () => {
        await fetch("/api/logout", { method: "POST" });
        setOutput("Logged out.");
        await refreshSession();
      });

      refreshSession();
    </script>
  </body>
</html>
